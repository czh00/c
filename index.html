                                <input type="checkbox" id="analog-clock-use-led-font-toggle" class="form-checkbox"
                                    data-setting-type="toggle" data-widget="analogClock" data-key="useLedFont">
                                <label for="analog-clock-use-led-font-toggle" class="cursor-pointer">LED 字型</label>
                                <div class="display-flex justify-content-space-between align-items-center">
                                    <label>指針</label><input type="color" class="color-picker" data-setting-type="color"
                                        data-widget="analogClock" data-var="--analog-hand-color"></div>
                                <div class="display-flex justify-content-space-between align-items-center">
                                    <label>秒針</label>
                                    <div class="p0">
                                        <input type="checkbox" id="analog-clock-smooth-seconds-toggle"
                                            class="form-checkbox" data-setting-type="toggle" data-widget="analogClock"
                                            data-key="smoothSeconds">
                                        <label for="analog-clock-smooth-seconds-toggle"
                                            class="cursor-pointer">平滑</label>
                                        <input type="color" class="color-picker" data-setting-type="color"
                                            data-widget="analogClock" data-var="--analog-second-hand-color">
                                    </div>
                                </div>
                                <div class="display-flex justify-content-space-between align-items-center">
                                    <label>刻度</label><input type="color" class="color-picker" data-setting-type="color"
                                        data-widget="analogClock" data-var="--analog-tick-color"></div>
                                <div class="display-flex justify-content-space-between align-items-center">
                                    <label>數字</label><input type="color" class="color-picker" data-setting-type="color"
                                        data-widget="analogClock" data-var="--analog-number-color"></div>
                            </div>
                        </div>
                    </div>
                    <div class="grid-column-span-2 md-grid-column-span-2">
                        <div
                            class="display-flex align-items-center justify-content-start width-full padding-vertical-2 p0 flex-wrap gap-3">
                            <div class="display-flex align-items-center gap-2">
                                <input type="checkbox" id="timed-effect-enabled-toggle" class="form-checkbox">
                                <label for="timed-effect-enabled-toggle"
                                    class="font-size-lg font-weight-semibold">定時特效</label>
                            </div>
                            <div class="display-flex align-items-center gap-2">
                                <label for="timed-effect-interval-seconds">觸發間隔</label>
                                <select id="timed-effect-interval-seconds"></select>
                                <span>秒</span>
                            </div>
                            <div class="display-flex align-items: center gap-2">
                                <label for="timed-effect-type">類型</label>
                                <select id="timed-effect-type">
                                    <option value="slide">滑動</option>
                                    <option value="layoutSwitch">版面切換</option>
                                </select>
                            </div>
                            <div class="display-flex align-items: center gap-3">
                                <div id="layout-switch-options" class="display-flex align-items-center gap-2"
                                    style="display: none;">
                                    <input type="checkbox" id="layout-switch-random-toggle" class="form-checkbox">
                                    <label for="layout-switch-random-toggle" class="cursor-pointer">亂數</label>
                                </div>
                                <div class="display-flex align-items-center gap-2">
                                    <input type="checkbox" id="transition-effect-enabled-toggle" class="form-checkbox">
                                    <label for="transition-effect-enabled-toggle" class="cursor-pointer">轉場特效</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="p0">
                    <div class="display-grid grid-columns-1 md-grid-columns-2 gap-4 align-items-center">
                        <div class="display-flex flex-direction-column row-gap-3 flex-shrink-0">
                            <div class="display-flex align-items-center column-gap-6 flex-wrap">
                                <div class="display-flex align-items-center gap-2">
                                    <input type="checkbox" id="marquee-enabled-toggle" class="form-checkbox"
                                        title="啟用/停用目前選擇的跑馬燈">
                                    <label for="marquee-enabled-toggle"
                                        class="font-size-lg font-weight-semibold">跑馬燈</label>
                                </div>
                                <div class="display-flex align-items-center">
                                    <label for="marquee-selector" class="flex-shrink-0">組別:</label>
                                    <select id="marquee-selector" class="width-auto margin-left-2"></select>
                                    <button id="add-marquee-btn" class="toolbar-btn margin-left-2"
                                        style="padding: 4px 8px; font-size: 16px;" title="新增跑馬燈">+</button>
                                    <button id="remove-marquee-btn" class="toolbar-btn margin-left-2"
                                        style="padding: 4px 8px; font-size: 16px;" title="刪除跑馬燈">-</button>
                                </div>
                                <div class="display-flex align-items-center column-gap-2 flex-grow-1 min-width-200px">
                                    <label for="marquee-speed-input" class="flex-shrink-0">速度</label>
                                    <input type="range" id="marquee-speed-input" min="1" max="1000" class="width-full">
                                </div>
                                <div class="display-flex align-items-center column-gap-4">
                                    <label
                                        class="display-flex align-items-center space-x-2 cursor-pointer flex-shrink-0"><input
                                            type="checkbox" id="marquee-vertical-toggle"
                                            class="form-checkbox"><span>直向</span></label>
                                    <div class="display-flex align-items-center">
                                        <label for="marquee-direction-select"
                                            class="flex-shrink-0 padding-right-2">方向:</label>
                                        <select id="marquee-direction-select"></select>
                                    </div>
                                    <div class="display-flex align-items-center column-gap-2">
                                        <label for="marquee-default-color">顏色</label>
                                        <input type="color" id="marquee-default-color" class="color-picker">
                                    </div>
                                    <div class="display-flex align-items-center gap-2">
                                        <input type="checkbox" id="marquee-use-led-font-toggle" class="form-checkbox"
                                            data-setting-type="toggle" data-widget="marqueeGlobal"
                                            data-key="useLedFont">
                                        <label for="marquee-use-led-font-toggle" class="cursor-pointer">LED 字型</label>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="display-flex align-items-center justify-content-flex-end gap-2 flex-wrap">
                            <label class="flex-shrink-0">地區</label>
                            <select id="countySelect"></select>
                            <select id="districtSelect"></select>
                            <input id="manualLocationInput" type="text" placeholder="手動輸入英文地名" class="width-40">
                            <button id="useCurrentLocationBtn" class="padding-1_5 border-radius-lg flex-shrink-0"
                                title="使用目前位置">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path d="M12 2L12 6" />
                                    <path d="M12 18L12 22" />
                                    <path d="M20 12L22 12" />
                                    <path d="M2 12L4 12" />
                                    <circle cx="12" cy="12" r="2" />
                                    <path d="M12 20a8 8 0 1 0 0-16 8 8 0 0 0 0 16z" />
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="margin-top-4 grid-column-span-2 display-flex align-items-flex-start">
                        <label class="flex-shrink-0 padding-top-2" style="margin-right: 0.75rem;">內容</label>
                        <div class="display-flex flex-direction-column width-full">
                            <div id="marquee-editor-blocks" class="marquee-block-editor" tabindex="0">
                                <!-- 塊狀內容將在此動態生成 -->
                            </div>
                            <textarea id="marquee-text-input" style="display: none;"></textarea>
                            <div class="font-size-xs color-gray-500 margin-top-1">提示：點擊下方模組加入，或在塊之間拖曳排序。</div>
                        </div>
                    </div>
                    <!-- 跑馬燈模組庫 -->
                    <div class="marquee-module-library margin-top-3 grid-column-span-2">
                        <div class="module-group">
                            <div class="module-group-title">常用工具</div>
                            <div class="module-pills-container">
                                <div class="module-pill tool-pill" id="tool-clear-marquee" style="background: rgba(245, 158, 11, 0.2); border-color: rgba(245, 158, 11, 0.4); color: #FDE68A; cursor: pointer;">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                                    清空內容
                                </div>
                                <div class="module-pill tool-pill" id="tool-reset-marquee" style="background: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.4); color: #FECACA; cursor: pointer;">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
                                    重置預設
                                </div>
                                <div class="module-pill tool-pill" id="tool-custom-text-drag" draggable="true" style="background: rgba(16, 185, 129, 0.2); border-color: rgba(16, 185, 129, 0.4); color: #D1FAE5; cursor: grab;">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                                    自訂
                                </div>
                                <input type="text" id="tool-custom-text-input" placeholder="輸入文字..." style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px; width: 100px;">
                                <input type="color" id="tool-custom-text-color" value="#FFD700" style="width: 30px; height: 24px; padding: 0; border: none; background: transparent; cursor: pointer; border-radius: 4px;">
                            </div>
                        </div>
                        <div class="module-group">
                            <div class="module-group-title">日期與時間</div>
                            <div class="module-pills-container">
                                <div class="module-pill" draggable="true" data-code="%YYYY%">西元年(4位)</div>
                                <div class="module-pill" draggable="true" data-code="%YY%">西元年(2位)</div>
                                <div class="module-pill" draggable="true" data-code="%ROC_YY%">民國年</div>
                                <div class="module-pill" draggable="true" data-code="%MM%">月份(01-12)</div>
                                <div class="module-pill" draggable="true" data-code="%DD%">日期(01-31)</div>
                                <div class="module-pill" draggable="true" data-code="%WEEKDAY%">星期全稱</div>
                                <div class="module-pill" draggable="true" data-code="%W_SHORT%">星期簡稱</div>
                                <div class="module-pill" draggable="true" data-code="%HH%">24時(00-23)</div>
                                <div class="module-pill" draggable="true" data-code="%hh%">12時(01-12)</div>
                                <div class="module-pill" draggable="true" data-code="%mm%">分鐘</div>
                                <div class="module-pill" draggable="true" data-code="%ss%">秒數</div>
                                <div class="module-pill" draggable="true" data-code="%ap_c%">中文時段</div>
                            </div>
                        </div>
                        <div class="module-group">
                            <div class="module-group-title">農曆與時辰</div>
                            <div class="module-pills-container">
                                <div class="module-pill" draggable="true" data-code="%L_GZ%">農曆干支</div>
                                <div class="module-pill" draggable="true" data-code="%L_SX%">生肖</div>
                                <div class="module-pill" draggable="true" data-code="%LM_C%">農曆月份</div>
                                <div class="module-pill" draggable="true" data-code="%LD_C%">農曆日期</div>
                                <div class="module-pill" draggable="true" data-code="%SHICHEN_NAME%">時辰</div>
                                <div class="module-pill" draggable="true" data-code="%MOON_ICON%">月相圖示</div>
                                <div class="module-pill" draggable="true" data-code="%CONSTELLATION%">星座</div>
                            </div>
                        </div>
                        <div class="module-group">
                            <div class="module-group-title">天氣與其它</div>
                            <div class="module-pills-container">
                                <div class="module-pill" draggable="true" data-code="%WEATHER_LOC%">地點</div>
                                <div class="module-pill" draggable="true" data-code="%WEATHER_DESC%">天氣描述</div>
                                <div class="module-pill" draggable="true" data-code="%TEMP%">氣溫</div>
                                <div class="module-pill" draggable="true" data-code="%SUNRISE%">日出</div>
                                <div class="module-pill" draggable="true" data-code="%SUNSET%">日落</div>
                                <div class="module-pill" draggable="true" data-code="%br%">換行(僅直向)</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="modal-backdrop-explanation" class="modal-backdrop">
        <div class="modal-content max-width-sm">
            <div class="padding-6">
                <div class="display-flex justify-content-space-between align-items-center margin-bottom-3">
                    <h3 id="explanation-title" class="font-size-xl font-weight-bold color-indigo-300"></h3><button
                        data-close-modal="modal-backdrop-explanation"
                        class="color-gray-400 hover-color-white font-size-3xl line-height-none">&times;</button>
                </div>
                <p id="explanation-content" class="color-gray-300 line-height-relaxed"></p>
            </div>
        </div>
    </div>
    <div id="modal-backdrop-prompt" class="modal-backdrop">
        <div class="modal-content max-width-sm">
            <div class="padding-6">
                <h3 id="prompt-title" class="font-size-xl font-weight-bold color-indigo-300 margin-bottom-4"></h3>
                <p id="prompt-message" class="color-gray-300 margin-bottom-4"></p><input id="prompt-input" type="text"
                    class="width-full margin-bottom-4">
                <div class="display-flex justify-content-flex-end gap-2"><button id="prompt-cancel-btn"
                        class="toolbar-btn">取消</button><button id="prompt-ok-btn" class="toolbar-btn">確定</button></div>
            </div>
        </div>
    </div>
<script src="js/globals.js" defer></script>
    <script src="js/constants.js" defer></script>
    <script src="js/utils.js" defer></script>
    <script src="js/weather.js" defer></script>
    <script src="js/clock.js" defer></script>
    <script src="js/calendar.js" defer></script>
    <script src="js/marquee.js" defer></script>
    <script src="js/settings.js" defer></script>
    <script src="js/group_ui.js" defer></script>
    <script src="js/ui.js" defer></script>
    <script src="js/main.js" defer></script>
</body>

</html>
